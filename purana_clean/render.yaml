services:
  - type: web
    name: purana
    env: node
    plan: free
    buildCommand: npm run install:all && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SEED_DEMO_DATA
        value: true
      - key: REFRESH_DEMO_DATA
        value: false
      - key: JWT_SECRET
        generateValue: true
      - key: MONGO_URI
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
